<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Create Account — Kumon Check-In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 44px; height: 44px;
      background: #1a3c8f;
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem;
    }
    .brand-name {
      font-size: 1.4rem;
      font-weight: 800;
      color: #1a3c8f;
    }
    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26,60,143,0.13);
      padding: 40px 36px;
      width: 100%;
      max-width: 460px;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 800;
      color: #1e293b;
      margin-bottom: 6px;
    }
    .subtitle {
      color: #64748b;
      font-size: 0.97rem;
      margin-bottom: 28px;
    }
    .field { margin-bottom: 18px; }
    label {
      display: block;
      font-weight: 700;
      font-size: 0.875rem;
      color: #374151;
      margin-bottom: 6px;
    }
    input[type=text], input[type=email], input[type=password] {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e2e8f0;
      border-radius: 10px;
      font-size: 1rem;
      color: #1e293b;
      outline: none;
      transition: border-color 0.15s;
      font-family: inherit;
    }
    input:focus { border-color: #1a3c8f; }
    input::placeholder { color: #94a3b8; }
    .divider {
      border: none;
      border-top: 2px solid #f0f4ff;
      margin: 20px 0;
    }
    .section-label {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #94a3b8;
      margin-bottom: 14px;
    }
    .btn {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 12px;
      font-size: 1.05rem;
      font-weight: 800;
      cursor: pointer;
      transition: opacity 0.15s, transform 0.1s;
      margin-top: 8px;
    }
    .btn:active { transform: scale(0.98); opacity: 0.88; }
    .btn-primary { background: #1a3c8f; color: white; }
    .btn-primary:hover { background: #1e47a8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: #fef2f2;
      border: 1.5px solid #fca5a5;
      border-radius: 10px;
      padding: 12px 16px;
      color: #dc2626;
      font-size: 0.9rem;
      font-weight: 600;
      margin-bottom: 16px;
      display: none;
    }
    .footer-link {
      text-align: center;
      margin-top: 22px;
      color: #64748b;
      font-size: 0.95rem;
    }
    .footer-link a {
      color: #1a3c8f;
      font-weight: 700;
      text-decoration: none;
    }
    .footer-link a:hover { text-decoration: underline; }
    .spinner {
      display: none;
      width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">📚</div>
  <span class="brand-name">Kumon Check-In</span>
</div>

<div class="card">
  <h1>Create your account</h1>
  <p class="subtitle">Set up check-in for your Kumon center in 2 minutes.</p>

  <div class="error-box" id="error"></div>

  <form id="signup-form" onsubmit="handleSignup(event)">
    <p class="section-label">Your Center</p>

    <div class="field">
      <label for="centerName">Center Name</label>
      <input id="centerName" type="text" placeholder="e.g. Kumon Citrus Park" required autocomplete="organization" />
    </div>

    <hr class="divider" />
    <p class="section-label">Your Account</p>

    <div class="field">
      <label for="ownerName">Your Name</label>
      <input id="ownerName" type="text" placeholder="First & last name" required autocomplete="name" />
    </div>

    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
    </div>

    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="At least 8 characters" required minlength="8" autocomplete="new-password" />
    </div>

    <div class="field">
      <label for="confirm">Confirm Password</label>
      <input id="confirm" type="password" placeholder="Repeat your password" required autocomplete="new-password" />
    </div>

    <button class="btn btn-primary" type="submit" id="submit-btn">
      <span id="btn-text">Create Account →</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>

  <p class="footer-link">
    Already have an account? <a href="/login.html">Sign in</a>
  </p>
</div>

<script>
  // If already logged in, go to admin
  fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/admin.html'; }).catch(() => {});

  async function handleSignup(e) {
    e.preventDefault();
    const centerName = document.getElementById('centerName').value.trim();
    const ownerName  = document.getElementById('ownerName').value.trim();
    const email      = document.getElementById('email').value.trim();
    const password   = document.getElementById('password').value;
    const confirm    = document.getElementById('confirm').value;

    const errEl = document.getElementById('error');
    errEl.style.display = 'none';

    if (password !== confirm) {
      errEl.textContent = 'Passwords do not match.';
      errEl.style.display = 'block';
      return;
    }

    setLoading(true);
    try {
      const res = await fetch('/api/auth/signup', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ centerName, ownerName, email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      window.location.href = '/admin.html';
    } catch (err) {
      errEl.textContent = err.message || 'Signup failed. Please try again.';
      errEl.style.display = 'block';
      setLoading(false);
    }
  }

  function setLoading(on) {
    document.getElementById('submit-btn').disabled = on;
    document.getElementById('btn-text').style.display   = on ? 'none'  : 'inline';
    document.getElementById('spinner').style.display    = on ? 'block' : 'none';
  }
</script>
</body>
</html>
