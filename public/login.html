<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign In — Kumon Check-In</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', Arial, sans-serif;
      background: #f0f4ff;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .brand {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 28px;
    }
    .brand-icon {
      width: 44px; height: 44px; background: #1a3c8f; border-radius: 12px;
      display: flex; align-items: center; justify-content: center; font-size: 1.5rem;
    }
    .brand-name { font-size: 1.4rem; font-weight: 800; color: #1a3c8f; }
    .card {
      background: white; border-radius: 20px;
      box-shadow: 0 8px 40px rgba(26,60,143,0.13);
      padding: 40px 36px; width: 100%; max-width: 420px;
    }
    h1 { font-size: 1.6rem; font-weight: 800; color: #1e293b; margin-bottom: 6px; }
    .subtitle { color: #64748b; font-size: 0.97rem; margin-bottom: 28px; }
    .field { margin-bottom: 18px; }
    label { display: block; font-weight: 700; font-size: 0.875rem; color: #374151; margin-bottom: 6px; }
    input {
      width: 100%; padding: 12px 16px; border: 2px solid #e2e8f0; border-radius: 10px;
      font-size: 1rem; color: #1e293b; outline: none; transition: border-color 0.15s; font-family: inherit;
    }
    input:focus { border-color: #1a3c8f; }
    input::placeholder { color: #94a3b8; }
    .btn {
      width: 100%; padding: 14px; border: none; border-radius: 12px;
      font-size: 1.05rem; font-weight: 800; cursor: pointer;
      transition: opacity 0.15s, transform 0.1s; margin-top: 8px;
    }
    .btn:active { transform: scale(0.98); opacity: 0.88; }
    .btn-primary { background: #1a3c8f; color: white; }
    .btn-primary:hover { background: #1e47a8; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error-box {
      background: #fef2f2; border: 1.5px solid #fca5a5; border-radius: 10px;
      padding: 12px 16px; color: #dc2626; font-size: 0.9rem; font-weight: 600;
      margin-bottom: 16px; display: none;
    }
    .footer-link { text-align: center; margin-top: 22px; color: #64748b; font-size: 0.95rem; }
    .footer-link a { color: #1a3c8f; font-weight: 700; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .spinner {
      display: none; width: 18px; height: 18px;
      border: 2px solid rgba(255,255,255,0.4); border-top-color: white;
      border-radius: 50%; animation: spin 0.7s linear infinite; margin: 0 auto;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<div class="brand">
  <div class="brand-icon">📚</div>
  <span class="brand-name">Kumon Check-In</span>
</div>

<div class="card">
  <h1>Welcome back</h1>
  <p class="subtitle">Sign in to your center's portal.</p>

  <div class="error-box" id="error"></div>

  <form id="login-form" onsubmit="handleLogin(event)">
    <div class="field">
      <label for="email">Email</label>
      <input id="email" type="email" placeholder="you@example.com" required autocomplete="email" />
    </div>
    <div class="field">
      <label for="password">Password</label>
      <input id="password" type="password" placeholder="Your password" required autocomplete="current-password" />
    </div>
    <button class="btn btn-primary" type="submit" id="submit-btn">
      <span id="btn-text">Sign In →</span>
      <span class="spinner" id="spinner"></span>
    </button>
  </form>

  <p class="footer-link">
    Don't have an account? <a href="/signup.html">Create one free</a>
  </p>
</div>

<script>
  fetch('/api/auth/me').then(r => { if (r.ok) window.location.href = '/admin.html'; }).catch(() => {});

  async function handleLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const errEl    = document.getElementById('error');
    errEl.style.display = 'none';
    setLoading(true);
    try {
      const res  = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error);
      window.location.href = '/admin.html';
    } catch (err) {
      errEl.textContent = err.message || 'Login failed.';
      errEl.style.display = 'block';
      setLoading(false);
    }
  }

  function setLoading(on) {
    document.getElementById('submit-btn').disabled = on;
    document.getElementById('btn-text').style.display  = on ? 'none'  : 'inline';
    document.getElementById('spinner').style.display   = on ? 'block' : 'none';
  }
</script>
</body>
</html>
